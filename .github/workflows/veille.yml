name: Veille Postes Argentine

on:
  workflow_dispatch:   # ⏸️ Agent en pause — relance manuelle uniquement

jobs:
  veille:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run agent
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python veille.py

      - name: Commit state si modifié
        run: |
          git config user.name "Agent Argentine"
          git config user.email "agent@veille-argentine.bot"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update state [skip ci]"
          git push
